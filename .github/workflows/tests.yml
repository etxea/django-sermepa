name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Django 3.2 (LTS) - Python 3.8, 3.9, 3.10
          - python-version: "3.8"
            django-version: "Django>=3.2,<4.0"
          - python-version: "3.9"
            django-version: "Django>=3.2,<4.0"
          - python-version: "3.10"
            django-version: "Django>=3.2,<4.0"
          # Django 4.0 - Python 3.8, 3.9, 3.10
          - python-version: "3.8"
            django-version: "Django>=4.0,<4.1"
          - python-version: "3.9"
            django-version: "Django>=4.0,<4.1"
          - python-version: "3.10"
            django-version: "Django>=4.0,<4.1"
          # Django 4.1 - Python 3.8, 3.9, 3.10, 3.11
          - python-version: "3.8"
            django-version: "Django>=4.1,<4.2"
          - python-version: "3.10"
            django-version: "Django>=4.1,<4.2"
          - python-version: "3.11"
            django-version: "Django>=4.1,<4.2"
          # Django 4.2 (LTS) - Python 3.8, 3.10, 3.11, 3.12
          - python-version: "3.8"
            django-version: "Django>=4.2,<5.0"
          - python-version: "3.10"
            django-version: "Django>=4.2,<5.0"
          - python-version: "3.11"
            django-version: "Django>=4.2,<5.0"
          - python-version: "3.12"
            django-version: "Django>=4.2,<5.0"
          # Django 5.0 - Python 3.10, 3.11, 3.12
          - python-version: "3.10"
            django-version: "Django>=5.0,<5.1"
          - python-version: "3.11"
            django-version: "Django>=5.0,<5.1"
          - python-version: "3.12"
            django-version: "Django>=5.0,<5.1"
          # Django 5.1 - Python 3.10, 3.11, 3.12, 3.13
          - python-version: "3.10"
            django-version: "Django>=5.1,<5.2"
          - python-version: "3.12"
            django-version: "Django>=5.1,<5.2"
          - python-version: "3.13"
            django-version: "Django>=5.1,<5.2"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "${{ matrix.django-version }}"
          pip install pyDes>=2.0.1 python-dateutil
          pip install pytest pytest-django

      - name: Run tests
        run: |
          python -m pytest sermepa/tests.py -v
        env:
          DJANGO_SETTINGS_MODULE: settings

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check sermepa/
